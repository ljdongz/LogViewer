name: SwiftUIExample
options:
  bundleIdPrefix: com.logviewer.example
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

packages:
  LogViewer:
    path: ../..

targets:
  SwiftUIExample:
    type: application
    platform: iOS
    sources:
      - .
    dependencies:
      - package: LogViewer
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.logviewer.example.swiftui
        SWIFT_VERSION: "5.9"
